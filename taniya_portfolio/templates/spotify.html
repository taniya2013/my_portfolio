<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Playlist Scraper</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <style>
        .table-container{
            padding:50px 8%;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:rgba(30,41,59,.75);
            backdrop-filter:blur(10px);
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid rgba(255,255,255,.1);
            color:#CBD5E1;
        }

        th{
            background:rgba(124,58,237,.35);
            color:white;
        }

        tr:hover{
            background:rgba(168,85,247,.15);
        }

        .no{
            width:80px;
            font-weight:600;
            color:#A855F7;
        }

        .song{
            font-weight:500;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2 class="logo">Spotify Scraper</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/spotify">Refresh</a></li>
        </ul>
    </nav>
</header>

<div class="table-container">

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Song Name</th>
            </tr>
        </thead>

        <tbody>
            {% for s in songs %}
            <tr>
                <td class="no">{{ s.No }}</td>
                <td class="song">{{ s.Song }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
