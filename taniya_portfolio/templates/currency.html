<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Currency Converter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:linear-gradient(135deg,#0B1120,#1E293B,#312E81);
    background-size:300% 300%;
    animation:gradientBG 10s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:1000px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:35px;
    text-shadow:0 0 15px rgba(168,85,247,.8);
}

form{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

input,
select{
    padding:12px 18px;
    border:none;
    border-radius:30px;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,.12);
    color:white;
}

select option{
    color:black;
}

input::placeholder{
    color:#ddd;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:30px;
    background:#A855F7;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#9333EA;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(168,85,247,.6);
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
}

th{
    background:#7C3AED;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,.05);
    border-bottom:1px solid rgba(255,255,255,.08);
}

tr:hover td{
    background:rgba(168,85,247,.15);
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    .container{
        width:100%;
        padding:20px;
    }

    h2{
        font-size:28px;
    }

    form{
        flex-direction:column;
    }

    input,
    select,
    button{
        width:100%;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

}

</style>

</head>

<body>

<div class="container">

<h2>💱 Currency Converter API</h2>

<form method="POST">

<input type="number" name="amount" placeholder="Enter Amount" required>

<select name="from_currency">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="INR">INR</option>
<option value="JPY">JPY</option>
</select>

<select name="to_currency">
<option value="INR">INR</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="JPY">JPY</option>
</select>

<button type="submit">Convert</button>

</form>

{% if data %}

<table>

<tr>
<th>From Currency</th>
<th>To Currency</th>
<th>Amount</th>
<th>Exchange Rate</th>
<th>Converted Amount</th>
<th>Last Updated</th>
</tr>

<tr>
<td>{{data["From Currency"]}}</td>
<td>{{data["To Currency"]}}</td>
<td>{{data["Amount"]}}</td>
<td>{{data["Exchange Rate"]}}</td>
<td>{{data["Converted Amount"]}}</td>
<td>{{data["Last Updated"]}}</td>
</tr>

</table>

{% endif %}

</div>

</body>
</html>
