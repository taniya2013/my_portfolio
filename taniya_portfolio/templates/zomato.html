<!DOCTYPE html>
<html>
<head>
    <title>Zomato Scraper</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#0B1120,#111827,#1E1B4B);
            color: #F8FAFC;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #A855F7;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30,41,59,.75);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,.1);
            text-align: left;
            color: #CBD5E1;
        }

        th {
            background: rgba(124,58,237,.35);
            color: white;
        }

        tr:hover {
            background: rgba(168,85,247,.15);
        }

        a {
            color: #A855F7;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        td:first-child {
            color: #A855F7;
            font-weight: 600;
        }
    </style>
</head>

<body>

<h1>🍽️ Zomato Restaurants Data</h1>

<table>
    <tr>
        <th>Sr No</th>
        <th>Name</th>
        <th>Rating</th>
        <th>Link</th>
    </tr>

    {% for item in data %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.rating }}</td>
        <td>
            <a href="{{ item.link }}" target="_blank">View</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
