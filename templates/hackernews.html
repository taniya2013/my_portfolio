<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hacker News Scraper</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <style>
        .table-container{
            padding:50px 8%;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:rgba(30,41,59,.75);
            backdrop-filter:blur(10px);
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid rgba(255,255,255,.1);
            color:#CBD5E1;
            vertical-align:top;
        }

        th{
            background:rgba(124,58,237,.35);
            color:white;
        }

        tr:hover{
            background:rgba(168,85,247,.15);
        }

        .title{
            max-width:600px;
        }

        a{
            color:#A855F7;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2 class="logo">Hacker News</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/hackernews">Refresh</a></li>
        </ul>
    </nav>
</header>

<div class="table-container">

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Link</th>
            </tr>
        </thead>

        <tbody>
            {% for n in news %}
            <tr>
                <td class="title">
                    {{ n.Title }}
                </td>

                <td>
                    <a href="{{ n.Link }}" target="_blank">
                        Open Link
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
