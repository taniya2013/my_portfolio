<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Movie Search App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0B1120,#111827,#1E1B4B);
            color:#F8FAFC;
            text-align:center;
        }

        /* HEADER */
        h1{
            background:rgba(124,58,237,.15);
            backdrop-filter:blur(10px);
            color:#A855F7;
            padding:20px;
            margin:0;
            border-bottom:1px solid rgba(255,255,255,.08);
        }

        /* FORM */
        form{
            margin:30px 0;
        }

        input{
            padding:12px;
            width:260px;
            border:none;
            outline:none;
            border-radius:10px;
            background:rgba(30,41,59,.75);
            color:white;
            border:1px solid rgba(255,255,255,.1);
        }

        button{
            padding:12px 18px;
            background:linear-gradient(45deg,#8B5CF6,#A855F7);
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin-left:10px;
            font-weight:600;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(168,85,247,.3);
        }

        /* TABLE */
        table{
            width:90%;
            margin:auto;
            border-collapse:collapse;
            background:rgba(30,41,59,.75);
            backdrop-filter:blur(10px);
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:14px;
            border-bottom:1px solid rgba(255,255,255,.1);
            color:#CBD5E1;
        }

        th{
            background:rgba(124,58,237,.35);
            color:white;
        }

        tr:hover{
            background:rgba(168,85,247,.15);
        }

        /* FOOTER SPACE */
        .space{
            height:40px;
        }

    </style>
</head>

<body>

    <h1>🎬 Movie Search App</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name" required>
        <button type="submit">Search</button>
    </form>

    {% if movies %}
    <table>
        <tr>
            <th>Title</th>
            <th>Year</th>
            <th>Type</th>
            <th>IMDB ID</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.Title }}</td>
            <td>{{ movie.Year }}</td>
            <td>{{ movie.Type }}</td>
            <td>{{ movie.imdbID }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}

    <div class="space"></div>

</body>

</html>
