<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books Scraper</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <style>
        .table-container{
            padding:50px 8%;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:rgba(30,41,59,.75);
            backdrop-filter:blur(10px);
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid rgba(255,255,255,.1);
            color:#CBD5E1;
            vertical-align:top;
        }

        th{
            background:rgba(124,58,237,.35);
            color:white;
        }

        tr:hover{
            background:rgba(168,85,247,.15);
        }

        img{
            width:60px;
            height:85px;
            object-fit:cover;
            border-radius:6px;
            border:1px solid #8B5CF6;
        }

        .title{
            max-width:350px;
            font-weight:500;
        }

        .price{
            color:#A855F7;
            font-weight:700;
        }

        .rating{
            color:#FACC15;
            font-weight:600;
        }

        .availability{
            color:#34D399;
            font-size:14px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2 class="logo">Books Scraper</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/books">Refresh</a></li>
        </ul>
    </nav>
</header>

<div class="table-container">

    <table>
        <thead>
            <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Availability</th>
            </tr>
        </thead>

        <tbody>
            {% for b in books %}
            <tr>
                <td>
                    <img src="{{ b.Image }}" alt="book">
                </td>

                <td class="title">
                    {{ b.Title }}
                </td>

                <td class="price">
                    {{ b.Price }}
                </td>

                <td class="rating">
                    {{ b.Rating }}
                </td>

                <td class="availability">
                    {{ b.Availability }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
