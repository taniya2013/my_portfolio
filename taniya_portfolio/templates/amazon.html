<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Products</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <style>
        .table-container{
            padding:50px 8%;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:rgba(30,41,59,.75);
            backdrop-filter:blur(10px);
            border-radius:15px;
            overflow:hidden;
        }

        th, td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid rgba(255,255,255,.1);
            color:#CBD5E1;
            vertical-align:top;
        }

        th{
            background:rgba(124,58,237,.35);
            color:white;
        }

        tr:hover{
            background:rgba(168,85,247,.15);
        }

        img{
            width:70px;
            height:70px;
            object-fit:contain;
            border-radius:10px;
            background:white;
            padding:5px;
        }

        .title{
            max-width:350px;
        }

        .price{
            color:#A855F7;
            font-weight:700;
            font-size:16px;
        }

        .rating{
            color:#FACC15;
            font-weight:600;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <h2 class="logo">Amazon Scraper</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/amazon">Refresh</a></li>
        </ul>
    </nav>
</header>

<div class="table-container">

    <table>
        <thead>
            <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Price</th>
                <th>Rating</th>
            </tr>
        </thead>

        <tbody>
            {% for p in products %}
            <tr>
                <td>
                    {% if p["Image URL"] != "N/A" %}
                        <img src="{{ p['Image URL'] }}">
                    {% endif %}
                </td>

                <td class="title">
                    {{ p["Title"] }}
                </td>

                <td class="price">
                    ₹ {{ p["Price"] }}
                </td>

                <td class="rating">
                    {{ p["Rating"] }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
