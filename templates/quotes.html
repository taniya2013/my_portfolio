<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Quotes Scraper</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #7C3AED;
        }

        .card {
            background: #1e1e1e;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            border-left: 5px solid #7C3AED;
        }

        .author {
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h1>🔥 Live Dynamic Quotes Scraper</h1>

{% for q in quotes %}
    <div class="card">
        <div>{{ q.quote }}</div>
        <div class="author">— {{ q.author }}</div>
    </div>
{% endfor %}

</body>
</html>
